services:
  backend:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - data:/app/data
    environment:
      - GIN_MODE=release
      - ALLOWED_ORIGINS=http://localhost:3000
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: always

volumes:
  data:
